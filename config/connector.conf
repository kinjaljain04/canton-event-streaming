# canton-event-streaming: HOCON Configuration
# This file configures the connection to the Canton ledger and the target event stream.
# It supports environment variable substitution using the ${?ENV_VAR} syntax.

canton-connector {
  # --- General Settings ---
  # The party ID whose ledger events (creations, archives) will be streamed.
  # This party must have visibility on the specified templates.
  # Example: "MyBank::1220..."
  partyId = ${?CANTON_CONNECTOR_PARTY_ID}

  # List of fully-qualified template IDs to stream events for.
  # An empty list `[]` means stream events for ALL templates visible to the party.
  # Example: [ "Canton.Examples.SupplyChain:Shipment", "Canton.Finance.Token:Fungible" ]
  templateIds = []

  # --- Canton Ledger API Connection ---
  ledgerApi {
    host = "localhost"
    port = 7575 # Default JSON API port for `dpm sandbox`

    # Use TLS for the connection to the Ledger API. Recommended for all production environments.
    tls {
      enabled = false
      # Path to the trusted CA certificate file if TLS is enabled and using a custom or self-signed CA.
      # If empty, the system's default trust store will be used.
      # caCertFile = "/etc/ssl/certs/canton-ca.pem"
    }

    # Authentication token (JWT) for the Ledger API.
    # It is strongly recommended to provide this via an environment variable.
    authToken = ${?CANTON_LEDGER_AUTH_TOKEN}
  }

  # --- Target Sink Configuration ---
  # Specify which downstream system to send events to.
  # Valid options: "kafka", "pulsar", "kinesis"
  target = "kafka"

  # --- Offset Management ---
  # The offset store determines where the connector saves its progress.
  # This allows the connector to resume streaming from where it left off after a restart.
  # Supported types: "file", "kafka", "postgres"
  offsetStore {
    type = "file"
    file {
      path = "/var/lib/canton-connector/offsets.json"
    }
    kafka {
      # These properties will inherit from the main `kafka` sink block unless overridden here.
      bootstrap.servers = "localhost:9092"
      topic = "__canton-connector-offsets"
      # properties = {}
    }
    postgres {
      url = "jdbc:postgresql://localhost:5432/offsets_db"
      user = "connector"
      password = ${?OFFSET_DB_PASSWORD}
      table = "canton_connector_offsets"
    }
  }

  # --- Replay Policy ---
  # Defines behavior on the very first run or if the offset store is unavailable.
  # "earliest": Start streaming from the beginning of the ledger history for the party.
  # "latest": Start streaming from the current end of the ledger, ignoring all past events.
  replay {
    from = "latest"
  }

  # --- Kafka Sink Configuration ---
  kafka {
    bootstrap.servers = "localhost:9092"

    # Strategy for determining the destination topic name.
    # "prefix": Topic is `${topic.prefix}.${template.module}.${template.name}`. Dots are replaced with dashes.
    # "static": All events go to a single topic defined by `${topic.static}`.
    topic.strategy = "prefix"
    topic.prefix = "canton.ledger.events"
    # topic.static = "all-canton-events"

    # Kafka producer settings. See https://kafka.apache.org/documentation/#producerconfigs
    # Settings below are configured for high-throughput, exactly-once semantics.
    properties {
      "acks" = "all"
      "retries" = 5
      "max.in.flight.requests.per.connection" = 1 # Guarantees ordering on retry
      "enable.idempotence" = "true"               # Prevents duplicates from producer retries
      "delivery.timeout.ms" = 120000
      "compression.type" = "snappy"
      "linger.ms" = 20
      "batch.size" = 32768
    }

    # Example security configuration for SASL_SSL
    # security {
    //   "security.protocol" = "SASL_SSL"
    //   "sasl.mechanism" = "PLAIN"
    //   "sasl.jaas.config" = "org.apache.kafka.common.security.plain.PlainLoginModule required username=\"${KAFKA_USER}\" password=\"${KAFKA_PASS}\";"
    //   "ssl.truststore.location" = "/etc/kafka/secrets/truststore.jks"
    //   "ssl.truststore.password" = ${?KAFKA_TRUSTSTORE_PASS}
    // }
  }

  # --- Pulsar Sink Configuration ---
  pulsar {
    service.url = "pulsar://localhost:6650"

    # Same topic strategy as Kafka.
    topic.strategy = "prefix"
    topic.prefix = "persistent://public/default/canton.ledger"
    # topic.static = "persistent://public/default/all-canton-events"

    # Example authentication using a token
    # auth {
    //   plugin = "org.apache.pulsar.client.impl.auth.AuthenticationToken"
    //   params = "token:${?PULSAR_AUTH_TOKEN}"
    // }

    producer {
      batching.enabled = true
      batching.max.publish.delay.ms = 10
      compression.type = "LZ4"
    }
  }

  # --- AWS Kinesis Sink Configuration ---
  kinesis {
    aws.region = "us-east-1"
    stream.name = "canton-ledger-stream"

    # Determines the Kinesis partition key for each record. This ensures related events
    # are processed in order within a single shard.
    # "contractId": Use the Daml contract ID. Good default for even distribution.
    # "payloadField": Use a specific field from the contract payload, e.g., `payload.tradeId`.
    partition.key.strategy = "contractId"
    # partition.key.payloadField = "tradeId"

    # AWS credentials are typically handled by the environment (e.g., IAM roles for EC2/EKS).
    # Only specify these for local development if needed.
    # credentials {
    //   accessKeyId = ${?AWS_ACCESS_KEY_ID}
    //   secretAccessKey = ${?AWS_SECRET_ACCESS_KEY}
    // }

    # Kinesis Producer Library (KPL) settings for aggregation and batching.
    kpl {
       aggregation.enabled = true
       max.connections = 24
       request.timeout.ms = 60000
    }
  }

  # --- Schema Registry Configuration (optional) ---
  # If enabled, the connector automatically derives and registers Avro/Protobuf schemas
  # from Daml templates in a Confluent-compatible Schema Registry.
  schemaRegistry {
    enabled = false
    url = "http://localhost:8081"
    format = "avro" # "avro" or "protobuf"

    # "topic": Subject name is <topic-name>-value (default for Kafka)
    # "record": Subject name is the fully-qualified Daml template name
    subject.name.strategy = "topic"

    # Additional properties for the schema registry client, e.g., for authentication.
    # properties {
    //   "basic.auth.credentials.source" = "USER_INFO"
    //   "basic.auth.user.info" = "${SR_USER}:${SR_PASS}"
    // }
  }
}