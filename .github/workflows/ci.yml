name: CI Build and Test

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

# Cancel in-progress runs on new commits to the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'sbt'

      - name: Check source code formatting
        run: sbt scalafmtCheckAll

      - name: Compile and run tests
        # This command will compile all sources, run unit tests, and integration tests.
        # We assume integration tests (e.g., ConnectorSpec, KafkaSinkSpec)
        # use the Testcontainers library to spin up Docker containers for
        # Kafka, Pulsar, and a Canton Sandbox as needed. This encapsulates
        # test dependencies within the test code itself, simplifying CI.
        run: sbt test

      - name: Package application (fat JAR)
        # This step ensures that the application packaging is correctly configured
        # and would produce the distributable artifact.
        run: sbt assembly

      - name: Upload connector artifact
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main' # Only upload for main branch builds
        with:
          name: canton-event-streaming-connector
          path: target/scala-*/canton-event-streaming-*.jar
          retention-days: 7