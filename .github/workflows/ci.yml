name: Canton Event Streaming CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build
      - run: npm test

  daml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Daml SDK
        run: curl -sSL https://get.daml.com/ | sh -s 2.9.0
      - run: ~/.daml/bin/daml build
